# ============================================================
# Distributed Logical Fallacy Detection System — Complete Config
# ============================================================

paths:
  raw_data:           data/raw
  processed_data:     data/processed
  retrieval_corpus:   data/retrieval_corpus
  generator_data:     data/generator_data
  classifier_model:   models/deberta_classifier
  generator_model:    models/generator
  faiss_index:        index/faiss
  outputs:            outputs

# ---- Dataset sources --------------------------------------
data:
  fallacy_csv:        data/raw/final_cleaned_dataset.csv
  kialo_csv:          data/raw/kialo_flat_clean.csv
  snli_csv:           data/raw/snli_clean.csv
  train_split:        0.8
  val_split:          0.1
  test_split:         0.1
  random_seed:        42

# ---- Label mapping ----------------------------------------
labels:
  - ad hominem
  - appeal to popularity
  - equivocation
  - fallacy of extension
  - false cause
  - false dilemma
  - hasty generalization
  - intentional
  - logical fallacy
  - relevance fallacy

# ---- Preprocessing ----------------------------------------
preprocessing:
  num_workers: 4
  chunk_size: 200
  spacy_model: en_core_web_sm

# ---- Retrieval / FAISS (For script 03) -------------------
retrieval:
  embedding_model: all-MiniLM-L6-v2
  embedding_batch_size: 64
  embedding_chunk_size: 2000
  nlist: 100
  index_type: IVFFlat
  metric: cosine

# ---- DeBERTa Classifier -----------------------------------
classifier:
  model_name: microsoft/deberta-v3-xsmall
  fallback_model: distilbert-base-uncased
  max_length: 256
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 3.0e-5
  epochs: 10
  warmup_ratio: 0.1
  weight_decay: 0.01
  dataloader_num_workers: 2
  early_stopping_patience: 3
  save_steps: 100
  logging_steps: 20
  fp16: false
  resume_from_checkpoint: null

# ---- DPR Retrieval (For new pipeline scripts) ------------
dpr:
  query_encoder: "facebook/dpr-question_encoder-single-nq-base"
  ctx_encoder: "facebook/dpr-ctx_encoder-single-nq-base"
  embedding_dim: 768
  top_k: 5

# ---- FAISS Index (For new pipeline scripts) --------------
faiss:
  nlist: 100
  nprobe: 10

# ---- RAG Generator ----------------------------------------
rag:
  model_name: "google/t5-small"
  max_input_length: 512
  max_output_length: 128
  num_beams: 4
  temperature: 0.7
  top_p: 0.9

# ---- Fusion Module ----------------------------------------
fusion:
  embedding_model: "all-MiniLM-L6-v2"
  similarity_threshold: 0.7

# ---- Inference --------------------------------------------
inference:
  batch_size: 16
  confidence_threshold: 0.6
  output_dir: "outputs/predictions"

  # Add this to your existing config.yaml
generator:
  model_name: google/t5-small
  fallback_model: facebook/bart-base
  max_input_length: 512
  max_output_length: 128
  batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 3.0e-4
  epochs: 10
  warmup_ratio: 0.05
  weight_decay: 0.01
  dataloader_num_workers: 4
  fp16: false
  resume_from_checkpoint: null